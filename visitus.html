<!DOCTYPE HTML>
<html>
<head>
  <title>Visit us</title>

  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function () {

      document.getElementById("contactForm").addEventListener("submit", function(e){
        e.preventDefault();

        var email = document.getElementById("email").value.trim();

        // Validation
        if (email === "" || !email.includes("@")) {
          alert("Please enter a valid email address");
          return;
        }

        // Collect form data
        const formData = new FormData(this);

        // Send to Flask backend
        fetch("http://127.0.0.1:5000/contact", {
          method: "POST",
          body: formData
        })
        .then(res => res.text())
        .then(data => {
          alert(data);
          document.getElementById("contactForm").reset(); // clear form
        })
        .catch(err => {
          alert("Error connecting to server");
          console.log(err);
        });

      });

    });
  </script>

</head>

<body text="black" bgcolor="#c2b280">
  <br><br>

  <font face="TimesNewRomans" size="4" color="black">
    
    <center><h1>Visit us</h1></center>
    <br><br>
    <center><h1>Let’s Brew Up a Conversation!</h1></center>

    <center>
      <form id="contactForm">
        <table width="300" cellspacing="10">
          
          <tr>
            <td>Name</td>
            <td>:</td>
            <td>
              <input type="text" id="name" name="name" placeholder="Your name..." required>
            </td>
          </tr>

          <tr>
            <td>Email</td>
            <td>:</td>
            <td>
              <input type="text" id="email" name="email" placeholder="Your email..." required>
            </td>
          </tr>

          <tr>
            <td>Message</td>
            <td>:</td>
            <td>
              <textarea id="message" name="message" placeholder="Tell us what's on your mind..." required></textarea>
            </td>
          </tr>

          <tr>
            <td>Submit</td>
            <td>:</td>
            <td>
              <button type="submit">Submit</button>
            </td>
          </tr>

        </table>
      </form>
    </center>

    <br><br><br><br><br><br><br><br>

  </font>

</body>
</html>
