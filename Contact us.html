<!DOCTYPE HTML>
<html>
<head>
  <title>Contact Us</title>
  <script type="text/javascript">
    function validateForm() {
      // Get values from input fields
      let name = document.getElementById("name").value.trim();
      let email = document.getElementById("email").value.trim();
      let message = document.getElementById("message").value.trim();

      // Check if any field is empty
      if (name === "" || email === "" || message === "") {
        alert("Please fill in all fields!");
        return false;
      }

      // Check email format (should contain '@')
      if (!email.includes("@")) {
        alert("Please enter a valid email address (not just a name).");
        return false;
      }

      // Show confirmation alert
      alert("Do you want to submit?");
      return true;
    }
  </script>
</head>

<body text="black" bgcolor="#c2b280">
  <br><br>
  <center>
    <h1>Contact Us</h1>
    <h2>Let’s Brew Up a Conversation!</h2>
    <form onsubmit="return validateForm();">
      <table cellpadding="8">
        <tr>
          <td>Name</td>
          <td>:</td>
          <td><input type="text" id="name" placeholder="Your name..."></td>
        </tr>
        <tr>
          <td>Email</td>
          <td>:</td>
          <td><input type="text" id="email" placeholder="Your email..."></td>
        </tr>
        <tr>
          <td>Message</td>
          <td>:</td>
          <td><textarea id="message" placeholder="Tell us what's on your mind..."></textarea></td>
        </tr>
        <tr>
          <td colspan="3" align="center">
            <input type="submit" value="Submit">
          </td>
        </tr>
      </table>
    </form>
  </center>

  <br><br><br><br><br>
  <br><br><br><br><br>

    📞 Call: +91-7530017429<br>
    ✉️ Email: sreemalathisreekumar@gmail.com
  </div>
</body>
</html>
